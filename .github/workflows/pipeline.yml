name: Multi-Project Pipeline

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'sdk/**'   # Trigger when files in sdk change
      - 'tools/**' # Trigger when files in tools change
  workflow_dispatch: # Allows manual trigger from Actions tab

jobs:
  # --- SDK Job (Documentation) ---
  sdk-docs:
    if: contains(github.event.head_commit.modified, 'sdk/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sdk
    steps:
      - uses: actions/checkout@v4
      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen
      - name: Run Doxygen
        run: doxygen doxygen/Doxyfile
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sdk/docs/html

  # --- Tools Job (Build & Test) ---
  tools-build:
    if: contains(github.event.head_commit.modified, 'tools/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tools
    steps:
      - uses: actions/checkout@v4
      - name: Setup Environment
        run: |
          chmod +x setup-env.sh
          ./setup-env.sh
      - name: Toolchain Check
        run: |
          ./toolchain/bin/riscv32-vega-elf-gcc --version
          ./utils/bin2hex --help

  # --- Deployment Job for GitHub Pages ---
  deploy-pages:
    needs: sdk-docs
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
